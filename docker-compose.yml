services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: portfolio
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: portfolio
      MYSQL_DATABASE: portfolio
    ports:
      - "3306:3306"
    volumes:
      - portfolio_db_data:/var/lib/mysql

volumes:
  portfolio_db_data:
